<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – GadgetMS</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>⚙️ GadgetMS</h1>
      <p>Student Gadget Management System</p>
    </div>
    <h2 class="auth-title">Sign In</h2>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}" style="margin-bottom:16px;">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="username" class="form-control" placeholder="you@college.edu" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>
      {% if form.errors %}
        <div class="alert alert-danger" style="margin-bottom:16px;">Invalid email or password.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">Sign In</button>
    </form>

    <p style="text-align:center;margin-top:20px;color:var(--text2);font-size:14px;">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--accent);">Register</a>
    </p>
  </div>
</div>
</body>
</html>
